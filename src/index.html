<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0284c7" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <title>StoryApp - Bagikan Pengalamanmu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>

<body class="overflow-x-hidden">

  <a href="#main-content" class="skip-to-content">Loncati ke konten utama</a>

  <header class="fixed top-0 left-0 right-0 z-[1000] bg-white border-b border-slate-200 h-[60px] md:h-20 flex items-center">
    <div class="w-full max-w-[1440px] mx-auto px-4 md:px-8 flex items-center justify-between">

      <a href="#/" class="flex items-center gap-2 md:gap-3 no-underline group" aria-label="Beranda StoryApp">
        <div
          class="w-10 h-10 md:w-12 md:h-12 bg-primary-600 rounded-xl md:rounded-2xl flex items-center justify-center text-white text-lg md:text-xl shadow-lg shadow-primary-600/20 group-hover:scale-110 transition-transform">
          <i class="fa-solid fa-location-dot" aria-hidden="true"></i>
        </div>
        <span class="text-xl md:text-2xl font-black text-slate-900 tracking-tighter uppercase">Story<span
            class="text-primary-600">App</span></span>
      </a>

      <button id="storiapp-drawer-button" class="md:hidden text-2xl p-2 text-slate-600 hover:text-slate-900"
        aria-label="Buka Menu Navigasi" aria-expanded="false">
        <i class="fa-solid fa-bars-staggered"></i>
      </button>

      <!-- Overlay/Backdrop -->
      <div id="storiapp-backdrop" class="fixed inset-0 bg-black/50 z-[1040] opacity-0 pointer-events-none transition-opacity duration-300 md:hidden"></div>

      <nav id="storiapp-navigation"
        class="fixed md:static top-0 right-0 h-full md:h-auto w-[300px] max-w-[75vw] md:w-auto bg-white md:bg-transparent z-[1050] md:z-auto translate-x-full md:translate-x-0 transition-transform duration-300 flex flex-col md:flex-row shadow-2xl md:shadow-none">
        
        <div class="flex items-center justify-between p-4 border-b border-slate-100 md:hidden shrink-0">
          <span class="font-black text-slate-900 uppercase text-sm">Menu</span>
          <button id="storiapp-drawer-close" class="text-slate-400 hover:text-rose-500 transition-colors p-2" aria-label="Tutup Menu">
            <i class="fa-solid fa-xmark text-2xl"></i>
          </button>
        </div>

        <div class="flex-1 overflow-y-auto md:overflow-visible p-4 md:p-0">
          <ul id="storiapp-nav-list" class="flex flex-col md:flex-row md:items-center gap-2 md:gap-2 list-none p-0 m-0">
          </ul>
          
          <!-- Container for Mobile Extra Features (like Story List) -->
          <div id="storiapp-mobile-extra" class="mt-4 pt-4 border-t border-slate-100 md:hidden empty:hidden">
          </div>
        </div>
      </nav>

    </div>
  </header>

  <main id="main-content" class="flex-1 flex flex-col pt-[60px] md:pt-20 outline-none" tabindex="-1">
    <div id="storiapp-main" class="flex-1 flex flex-col">
    </div>
  </main>

  <script type="module" src="/scripts/index.js"></script>
</body>

</html>
